# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=ormuser
spring.datasource.password=ormpass
spring.datasource.hikari.connection-test-query=SELECT 1
# NOTE: if you still get Access denied, your MySQL root auth/plugin may differ; update credentials accordingly.


# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# Enable automatic execution of schema.sql on startup
# For Spring Boot 2.x
spring.datasource.initialization-mode=always
# For Spring Boot 3.x (if applicable)
spring.sql.init.mode=always
